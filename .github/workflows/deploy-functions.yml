name: Deploy Cloud Functions & Firestore Rules

# Triggers:
#   - push to master touching functions/, firestore.rules, or firebase.json
#     -> builds and deploys automatically
#   - manual dispatch -> same, with the option to also run the one-off
#     answerKeys migration first (only needed once per environment, before
#     the server-side-grading client build ships — see
#     functions/src/scripts/migrateAnswerKeys.ts)
on:
  push:
    branches: [master]
    paths:
      - "functions/**"
      - "firestore.rules"
      - "firebase.json"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Also run the answerKeys migration before deploying (one-off, idempotent, only needed once per environment)"
        type: boolean
        required: false
        default: false

concurrency:
  group: deploy-functions-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build, (optionally) migrate, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      # Defense in depth: functions-ci.yml already gates PRs, but this
      # trigger also fires on a direct push to master, so lint/test run
      # here too rather than trusting that a PR check happened first.
      - name: ESLint
        working-directory: functions
        run: npm run lint

      - name: Unit tests
        working-directory: functions
        run: npm run test

      - name: Build
        working-directory: functions
        run: npm run build

      # No downloadable key involved: this mints a short-lived token for
      # github-actions-deployer@... via Workload Identity Federation, scoped
      # to this repo + the master branch (see the provider's
      # attribute-condition). Replaces the old FIREBASE_SERVICE_ACCOUNT_JSON
      # secret, which was a long-lived key with standing deploy access —
      # if it ever leaked, whoever had it could deploy indefinitely until
      # someone noticed and rotated it manually. WIF has no key to leak.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      # One-off: splits correctIndex/explanation out of existing question
      # docs into the answerKeys collection. Safe to re-run (it's a no-op
      # for already-migrated docs), but only ever needs to run once per
      # environment, and only ever via manual dispatch — never on a plain
      # push, so an ordinary functions/ code change can't accidentally
      # trigger a Firestore migration.
      - name: Run answerKeys migration
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migration == 'true' }}
        working-directory: functions
        env:
          GCLOUD_PROJECT: ${{ vars.FIREBASE_PROJECT_ID }}
        run: node lib/scripts/migrateAnswerKeys.js

      - name: Deploy functions + Firestore rules
        run: |
          npx --yes firebase-tools@15.23.0 deploy \
            --only functions,firestore:rules \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --non-interactive
