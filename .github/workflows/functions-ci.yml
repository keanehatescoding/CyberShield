name: Functions CI

# Runs lint, unit tests, and a build check on every change to functions/
# — including PRs, which deploy-functions.yml (push-to-master only) never
# gated. This is the check that has to pass before deploy-functions.yml
# is ever reached.
on:
  push:
    branches: [master]
    paths:
      - "functions/**"
      - ".github/workflows/functions-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "functions/**"
      - ".github/workflows/functions-ci.yml"

concurrency:
  group: functions-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test & Build (Functions)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: ESLint
        working-directory: functions
        run: npm run lint

      - name: Unit tests
        working-directory: functions
        run: npm run test

      - name: Build
        working-directory: functions
        run: npm run build
