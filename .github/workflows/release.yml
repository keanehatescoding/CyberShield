name: Release

# Triggers:
#   - push a tag like v1.2.0            -> signs, builds, distributes to Firebase App Distribution
#   - manual dispatch                    -> same, lets you pick the tester group / add release notes
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      groups:
        description: "Firebase App Distribution tester group(s), comma-separated"
        required: false
        default: "testers"
      release_notes:
        description: "Release notes shown to testers"
        required: false
        default: ""

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-sign-distribute:
    name: Sign, Build & Distribute
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "${{ runner.temp }}/keystore"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/keystore/release.jks"

      # app/build.gradle.kts reads KEYSTORE_PATH / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD
      # straight out of local.properties (same file you use locally) — no gradle.properties
      # or env-var wiring needed on the Kotlin DSL side.
      - name: Write local.properties
        env:
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        run: |
          cat > local.properties <<EOF
          sdk.dir=${ANDROID_HOME}
          KEYSTORE_PATH=${{ runner.temp }}/keystore/release.jks
          KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
          KEY_ALIAS=${KEY_ALIAS}
          KEY_PASSWORD=${KEY_PASSWORD}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Release build type isn't covered by ci.yml's testDebugUnitTest — run it here too
      # so a release never ships without its own unit test pass, e.g. release-only
      # R8/proguard-sensitive code paths.
      - name: Run release unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Build signed release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Build signed release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ github.event.inputs.groups || 'testers' }}
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: ${{ github.event.inputs.release_notes || format('Automated release from {0}', github.ref_name) }}

      - name: Shred keystore
        if: always()
        run: shred -u "${{ runner.temp }}/keystore/release.jks" 2>/dev/null || true