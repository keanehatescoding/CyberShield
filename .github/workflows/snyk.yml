name: Security Scan (Snyk)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly scan to catch newly disclosed CVEs in dependencies already merged
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Write local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/gradle-9-jdk21@master
        continue-on-error: true
        with:
          args: >
            --severity-threshold=high
            --sarif-file-output=snyk.sarif

      - name: Skip notice (SNYK_TOKEN not configured)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::SNYK_TOKEN secret is not set — add it in repo Settings > Secrets to enable scanning."

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ env.SNYK_TOKEN != '' && always() }}
        with:
          sarif_file: snyk.sarif